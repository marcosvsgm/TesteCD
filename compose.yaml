services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: dc-tecnologia-vendas
    ports:
      - "10000:10000"
    environment:
      PORT: 10000
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
